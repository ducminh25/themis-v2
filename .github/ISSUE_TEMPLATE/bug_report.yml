name: Báo lỗi
description: Báo cáo một lỗi có thể tái hiện trong ThemisV2
title: "[Bug]: "
labels:
  - bug
body:
  - type: input
    id: version
    attributes:
      label: Phiên bản ThemisV2
      placeholder: v1.1.0
    validations:
      required: true
  - type: dropdown
    id: operating-system
    attributes:
      label: Hệ điều hành
      options:
        - Windows 10/11 x64
        - macOS Intel
        - macOS Apple Silicon
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Các bước tái hiện
      description: Liệt kê các thao tác theo thứ tự và dùng dữ liệu mẫu không nhạy cảm.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Kết quả mong đợi
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Kết quả thực tế và log
      description: Xoá token, đường dẫn riêng tư và dữ liệu thí sinh trước khi gửi.
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Xác nhận riêng tư
      options:
        - label: Tôi đã xoá dữ liệu cá nhân, đề thi chưa công bố và thông tin đăng nhập.
          required: true

